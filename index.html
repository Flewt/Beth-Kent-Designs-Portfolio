<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beth Kent Design</title>
  <meta name="description" content="UX/UI Designer portfolio — Beth Kent." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="landing" id="landing-body">

  <div id="transition-overlay" aria-hidden="true"></div>

  <button class="paw-btn" id="paw-btn" aria-label="Enter portfolio">
    <svg class="paw-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <!-- Toe pads -->
      <ellipse cx="25" cy="28" rx="10" ry="12" />
      <ellipse cx="45" cy="18" rx="10" ry="12" />
      <ellipse cx="65" cy="18" rx="10" ry="12" />
      <ellipse cx="80" cy="28" rx="10" ry="12" />
      <!-- Main pad -->
      <path d="M18,52 Q14,72 28,82 Q42,92 50,92 Q58,92 72,82 Q86,72 82,52 Q78,38 62,36 Q50,34 38,36 Q22,38 18,52 Z" />
    </svg>
    <span class="paw-label">click here</span>
  </button>

  <script src="js/main.js"></script>
  <script>
    var btn     = document.getElementById('paw-btn');
    var overlay = document.getElementById('transition-overlay');
    var triggered = false;

    function enter() {
      if (triggered) return;
      triggered = true;
      btn.classList.add('zooming');
      setTimeout(function () {
        overlay.classList.add('flash');
        setTimeout(function () {
          window.location.href = 'home.html';
        }, 220);
      }, 420);
    }

    btn.addEventListener('click', enter);
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') enter();
    });
  </script>

</body>
</html>
